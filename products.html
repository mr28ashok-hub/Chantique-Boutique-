<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Chantique Boutique - Products</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body onload="loadProductsPage()">

      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html" class="active">Products</a></li>
